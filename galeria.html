<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Motos</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color: lightblue;
    margin: 0;
    text-align: center;
}

h1{
    margin: 20px;
}

/* GALERÍA RESPONSIVA */
.galeria{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.galeria img{
    width: 300px;
    max-width: 100%;
    height: auto;
    object-fit: cover;
    border-radius: 10px;
    border: 3px solid white;
    transition: transform 0.3s;
}

.galeria img:hover{
    transform: scale(1.05);
}

/* RESPONSIVE */

/* CELULAR */
@media (max-width: 600px){

    h1{
        font-size: 20px;
    }

}

/* TABLET */
@media (min-width: 601px) and (max-width: 1024px){

    h1{
        font-size: 24px;
    }

}

/* IMÁGENES */
img{
    max-width: 100%;
    height: auto;
}

</style>
</head>

<body>

<a href="index.html">«««</a>
